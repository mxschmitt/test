name: CI
on: [push]
jobs:
  with-miniconda:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    name: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v2
    - uses: mxschmitt/setup-miniconda@master
      with:
        auto-update-conda: true
        python-version: "3.9"
     # Debugging session
    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3
      timeout-minutes: 15
  without-miniconda:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    name: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v2
     # Debugging session
    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3
      timeout-minutes: 15
