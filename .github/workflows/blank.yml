name: CI
on: [push]
jobs:
  with-miniconda:
    runs-on: ubuntu-latest
    name: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v2
    - uses: conda-incubator/setup-miniconda@v2
      with:
        auto-update-conda: true
        python-version: "3.9"
    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3
