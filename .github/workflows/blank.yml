name: CI
on: [push]
jobs:
  build1:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-20.04, windows-2019, ubuntu-18.04, ubuntu-16.04, macos-10.15]
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v2
    - name: Setup tmate session
      uses: mxschmitt/action-tmate@chore/nits
      with:
        limit-access-to-actor: true
